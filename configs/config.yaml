# ============================================================
# Grape Disease Detection — Experiment Configuration
# ============================================================

project:
  name: "grape-disease-detection"
  seed: 42
  experiment_name: "mobilenetv3_large_v1"

dataset:
  zip_name: "Ranveer_Realistic_dataset_2000_1126.zip"
  # EXACT Drive path — confirmed by user upload
  zip_path: "/content/drive/MyDrive/PlantDiseaseDataset/Custom Dataset for Plant Species and Disease Detec/Ranveer_Realistic_dataset_2000_1126.zip"
  drive_folder: "PlantDiseaseDataset/Custom Dataset for Plant Species and Disease Detec"
  extract_path: "/content/grape_only"               # local Colab extract target
  # Top-level folder INSIDE the zip (confirmed: Ranveer_Realistic_dataset_2000_1126/grape_*)
  nested_parent: "Ranveer_Realistic_dataset_2000_1126"
  species_prefix: "grape_"
  image_extensions: [".jpg", ".jpeg", ".png", ".bmp", ".tiff", ".webp"]

  # Exact folder names — note typo 'dificiency' is intentional (matches dataset)
  classes:
    - "grape_anthracnose"
    - "grape_guignardia_bidwellii"
    - "grape_healthy"
    - "grape_insect_eating"
    - "grape_mineral_dificiency"
    - "grape_plasmopara_viticola"
    - "grape_plasmopara_viticola_guignardia_bidwellii"
    - "grape_plasmopara_viticola_insect_eating"
    - "grape_powdery_mildew_insect_eating"

  split:
    train: 0.70
    val:   0.15
    test:  0.15

preprocessing:
  image_size: 224                   # model input size (pixels)
  imagenet_mean: [0.485, 0.456, 0.406]
  imagenet_std:  [0.229, 0.224, 0.225]

augmentation:
  random_resized_crop: 224
  horizontal_flip_p: 0.5
  vertical_flip_p:   0.3
  rotation_degrees:  30
  color_jitter:
    brightness: 0.3
    contrast:   0.3
    saturation: 0.2
    hue:        0.1
  random_erasing_p:  0.2

training:
  model_name: "mobilenet_v3_large"  # torchvision model key
  pretrained: true
  freeze_backbone: true             # unfreeze last 3 feature blocks only
  num_workers: 2
  batch_size: 32
  epochs: 40
  early_stopping_patience: 8
  label_smoothing: 0.1

optimizer:
  name: "AdamW"
  lr: 0.001
  weight_decay: 0.0001

scheduler:
  name: "CosineAnnealingLR"
  T_max: 40                        # matches epochs

outputs:
  model_dir:   "/content/drive/MyDrive/PlantDiseaseDataset/outputs/models"
  plot_dir:    "/content/drive/MyDrive/PlantDiseaseDataset/outputs/plots"
  report_dir:  "/content/drive/MyDrive/PlantDiseaseDataset/outputs/reports"
  best_model_name: "grape_mobilenetv3_best.pth"
  onnx_model_name: "grape_mobilenetv3.onnx"
